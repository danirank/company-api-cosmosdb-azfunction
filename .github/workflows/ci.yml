name: "CI"

on:
  push: 
    branches:
      - main 

jobs:
  backend-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Company.slnx

      - name: Build
        run: dotnet build Backend/PhysioPortal.slnx --configuration Release --no-restore